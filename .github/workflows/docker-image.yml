name: Docker Image CI

on:
  push:
    paths:
      - 'Dockerfile'
  pull_request:
    paths:
      - 'Dockerfile'
  workflow_dispatch:
  schedule:
    # Rebuild every Monday at 03:00 UTC to pick up fresh ubuntu patches
    - cron: '0 3 * * 1'


env:
  IMAGENAME: ubuntu_headless
  IMAGETAG: latest

jobs:

  build_and_upload_to_docker_hub:

    runs-on: ubuntu-latest

    steps: 
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to DockerHub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build
      uses: docker/build-push-action@v6
      with:
        push: false
        load: true
        tags: ${{ secrets.DOCKER_USER }}/${{ env.IMAGENAME }}:${{ env.IMAGETAG }}

    - name: Scan for CVEs (informational, does not block push)
      uses: aquasecurity/trivy-action@0.31.0
      with:
        image-ref: '${{ secrets.DOCKER_USER }}/${{ env.IMAGENAME }}:${{ env.IMAGETAG }}'
        format: 'table'
        exit-code: '0'
        severity: 'CRITICAL,HIGH'

    - name: Push
      uses: docker/build-push-action@v6
      with:
        push: true
        tags: ${{ secrets.DOCKER_USER }}/${{ env.IMAGENAME }}:${{ env.IMAGETAG }}

    - name: List Docker Images
      run: docker images

